metadata:
  name: hybrid_fraud_ops_demo
  description: Mixed curated fraud-ops showcase spanning multiple fraud families and mixed outcomes.
generation:
  recommended_profile: medium_demo
  default_days: 60
  default_seed: 509
  batch_style: multi_scenario
  scenario_families:
    - account_takeover
    - mule_transfer
    - card_not_present
    - false_positive
    - suspicious_new_device
scenario_controls:
  scenario_counts:
    account_takeover: 220
    mule_transfer: 180
    card_not_present: 220
    suspicious_new_device: 140
    false_positive: 120
    burst_velocity: 80
    repeat_offender: 80
  confirmed_fraud_target: 820
  false_positive_target: 220
  timing_style: distributed
lifecycle_controls:
  risk_signal_count: 1500
  alert_count: 560
  case_count: 320
  decision_count: 280
  disposition_count: 260
outcome_controls:
  decision_mix:
    decline: 110
    hold: 60
    file_sar: 40
    challenge: 30
    close_no_fraud: 25
    approve: 15
  disposition_mix:
    confirmed_fraud: 90
    recovered: 70
    written_off: 35
    false_positive: 40
    customer_error: 25
  ratio_expectations:
    alert_ratio: 0.37
    case_ratio: 0.57
calendar_controls:
  start_year: 2025
  start_month: 9
  end_year: 2025
  end_month: 10
  month_weighting:
    "9": 1.0
    "10": 1.4
  quarter_end_spike: true
  holiday_spike: false
geography_controls:
  region_mix:
    NAM_EAST: 1.5
    EUR_CORE: 1.2
    APAC_NORTH: 0.9
  branch_territory_mix:
    NAM_EAST_T01: 1.4
organization_controls:
  business_unit_mix:
    fraud_operations: 1.7
    risk_management: 1.3
  analyst_team_mix:
    FRA_02_TEAM_02: 1.4
  branch_activity_mix:
    NAM_EAST_T01: 1.4
customer_controls:
  customer_segment_mix:
    mass_market: 0.6
    affluent: 0.25
    small_business: 0.15
payment_controls:
  payment_rail_mix:
    ach: 1.2
    rtp: 1.3
    wire: 0.8
    internal_transfer: 1.0
    card: 1.1
  cross_border_ratio: 0.18
fraud_ops_controls:
  alert_source_mix:
    rules_engine: 1.2
    ml_model: 1.5
  case_priority_mix:
    p1: 1.3
    p2: 1.1
  decision_reason_mix:
    high_risk_score: 1.5
    device_mismatch: 1.2
  recovery_status_mix:
    pending_recovery: 1.1
    partially_recovered: 1.0
    fully_recovered: 1.2
    written_off: 0.9
realism_controls:
  emphasize_new_device_behavior: true
  emphasize_shared_device_clustering: true
  emphasize_new_payees: true
  emphasize_off_hours: true
  emphasize_reversals: true
  emphasize_recoveries: true
validation:
  dominant_scenario: account_takeover
  ratio_tolerance: 0.1
