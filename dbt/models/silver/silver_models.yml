version: 2

models:
  - name: slv__payment_instruction
    description: "Silver conformed payment instruction dataset."
    config:
      tags: ["quality", "quality_critical", "contract_critical", "silver", "tier_1_critical"]
    meta:
      owner: "fraudlens-data-platform"
      steward: "payments-operations"
      domain: "payment_lifecycle"
      criticality: "high"
      contract_required_fields: ["payment_instruction_id", "instruction_status", "debtor_account_id", "instructed_amount", "event_at", "ingestion_batch_id", "source_file_name", "ingested_at_utc", "lineage_run_id"]
      contract_expected_types:
        payment_instruction_id: "string"
        instruction_status: "string"
        debtor_account_id: "string"
        instructed_amount: "decimal"
        event_at: "timestamp"
        booking_date: "date"
      contract_controlled_fields:
        instruction_status: ["PENDING", "AUTHORIZED", "RELEASED", "SETTLED", "REJECTED", "CANCELLED"]
        payment_rail_code: ["ACH", "SWIFT", "SEPA", "RTP", "CARD", "WIRE", "INTERNAL"]
    columns:
      - name: payment_instruction_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "silver", "tier_1_critical"]
          - unique:
              config:
                tags: ["quality", "quality_unique", "quality_critical", "silver", "tier_1_critical"]
      - name: debtor_account_id
        data_tests:
          - relationships:
              to: ref('slv__deposit_account')
              field: deposit_account_id
              config:
                tags: ["quality", "quality_relationships", "quality_critical", "silver", "tier_1_critical"]
      - name: instruction_status
        data_tests:
          - accepted_values:
              values: ["PENDING", "AUTHORIZED", "RELEASED", "SETTLED", "REJECTED", "CANCELLED"]
              config:
                tags: ["quality", "quality_accepted_values", "quality_high", "silver", "tier_1_critical"]
      - name: payment_rail_code
        data_tests:
          - accepted_values:
              values: ["ACH", "SWIFT", "SEPA", "RTP", "CARD", "WIRE", "INTERNAL"]
              config:
                tags: ["quality", "quality_accepted_values", "quality_high", "silver", "tier_1_critical"]
      - name: ingestion_batch_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "silver", "tier_1_critical", "audit_critical"]

  - name: slv__payment_transaction
    description: "Silver conformed payment transaction dataset."
    config:
      tags: ["quality", "quality_critical", "contract_critical", "silver", "tier_1_critical"]
    meta:
      owner: "fraudlens-data-platform"
      steward: "payments-settlement"
      domain: "payment_lifecycle"
      criticality: "high"
      contract_required_fields: ["payment_transaction_id", "payment_instruction_id", "transaction_status", "booking_amount", "transaction_direction_code", "ingestion_batch_id", "source_file_name", "ingested_at_utc", "lineage_run_id"]
      contract_expected_types:
        payment_transaction_id: "string"
        payment_instruction_id: "string"
        transaction_status: "string"
        booking_amount: "decimal"
        settlement_at: "timestamp"
        posted_date: "date"
      contract_controlled_fields:
        transaction_status: ["PENDING", "SETTLED", "REVERSED", "FAILED", "CANCELLED"]
        transaction_direction_code: ["DEBIT", "CREDIT"]
    columns:
      - name: payment_transaction_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "silver", "tier_1_critical"]
          - unique:
              config:
                tags: ["quality", "quality_unique", "quality_critical", "silver", "tier_1_critical"]
      - name: payment_instruction_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "silver", "tier_1_critical"]
          - relationships:
              to: ref('slv__payment_instruction')
              field: payment_instruction_id
              config:
                tags: ["quality", "quality_relationships", "quality_critical", "silver", "tier_1_critical"]
      - name: transaction_status
        data_tests:
          - accepted_values:
              values: ["PENDING", "SETTLED", "REVERSED", "FAILED", "CANCELLED"]
              config:
                tags: ["quality", "quality_accepted_values", "quality_high", "silver", "tier_1_critical"]
      - name: transaction_direction_code
        data_tests:
          - accepted_values:
              values: ["DEBIT", "CREDIT"]
              config:
                tags: ["quality", "quality_accepted_values", "quality_high", "silver", "tier_1_critical"]

