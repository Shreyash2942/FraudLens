  - name: stg_bronze__payment_instruction
    description: "Bronze staging view for payment instructions."
    config:
      tags: ["quality", "quality_critical", "contract_critical", "bronze", "tier_1_critical"]
    meta:
      owner: "fraudlens-data-platform"
      steward: "payments-operations"
      domain: "payment_lifecycle"
      criticality: "high"
      contract_required_fields: ["payment_instruction_id", "instruction_status", "debtor_account_id", "ingestion_batch_id", "source_file_name", "ingested_at_utc", "lineage_run_id"]
      contract_expected_types:
        payment_instruction_id: "string"
        instruction_status: "string"
        debtor_account_id: "string"
        instructed_amount: "decimal"
        event_at: "timestamp"
        booking_date: "date"
      contract_controlled_fields:
        instruction_status: ["PENDING", "AUTHORIZED", "RELEASED", "SETTLED", "REJECTED", "CANCELLED"]
        payment_rail_code: ["ACH", "SWIFT", "SEPA", "RTP", "CARD", "WIRE", "INTERNAL"]
    columns:
      - name: payment_instruction_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "bronze", "tier_1_critical"]
          - unique:
              config:
                tags: ["quality", "quality_unique", "quality_critical", "bronze", "tier_1_critical"]
      - name: ingestion_batch_id
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "bronze", "tier_1_critical", "audit_critical"]
      - name: source_file_name
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "bronze", "tier_1_critical", "audit_critical"]
      - name: ingested_at_utc
        data_tests:
          - not_null:
              config:
                tags: ["quality", "quality_not_null", "quality_critical", "bronze", "tier_1_critical", "audit_critical"]
