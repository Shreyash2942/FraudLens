defaults:
  profile: local
  strict_mode: true
  allow_empty: false
  max_parallel_datasets: 4
  schedule: null
  schedule_mode: manual
  runtime_policies:
    infra_transient:
      retries: 2
      retry_delay_minutes: 5
      max_retry_delay_minutes: 20
      retry_exponential_backoff: true
      execution_timeout_minutes: 15
    ingestion_dataset:
      retries: 1
      retry_delay_minutes: 5
      max_retry_delay_minutes: 20
      retry_exponential_backoff: true
      execution_timeout_minutes: 30
    dbt_transform:
      retries: 1
      retry_delay_minutes: 5
      max_retry_delay_minutes: 20
      retry_exponential_backoff: true
      execution_timeout_minutes: 45
    validation_gate:
      retries: 0
      retry_delay_minutes: 1
      max_retry_delay_minutes: 5
      retry_exponential_backoff: false
      execution_timeout_minutes: 20
    deterministic_contract:
      retries: 0
      retry_delay_minutes: 1
      max_retry_delay_minutes: 5
      retry_exponential_backoff: false
      execution_timeout_minutes: 10
    artifact_publish:
      retries: 1
      retry_delay_minutes: 2
      max_retry_delay_minutes: 10
      retry_exponential_backoff: true
      execution_timeout_minutes: 10

profiles:
  local:
    description: Local Spark/Hive execution for development validation.
    runtime:
      schedule_mode: manual
      schedule_cron: null
      run_window_start_utc: "00:00"
      run_window_end_utc: "23:59"
      max_active_runs: 1
      dagrun_timeout_minutes: 240
    ingestion:
      execution_mode: spark_job
      command_profile: local
      spark_submit_cmd: python
      strict_mode: true
      max_parallel_datasets: 4
    transformation:
      execution_mode: dbt_build
      dbt_profile: fraudlens_local_spark
      dbt_target: local
      threads: 4
    validation:
      execution_mode: dbt_test
      dbt_profile: fraudlens_local_spark
      dbt_target: local
      strict_mode: true
    observability:
      enabled: true
      emit_metrics: true
      emit_lineage: true
      artifact_backend: mongodb
      mongodb_uri_env: FRAUDLENS_MONGODB_URI
      mongodb_default_uri: mongodb://admin:admin@localhost:27017/datalab?authSource=admin
      mongodb_database: datalab
      mongodb_collection: orchestration_artifacts
      metrics_namespace: fraudlens.orchestration.local
      lineage_namespace: fraudlens.orchestration.local

  ci:
    description: CI contract mode without dataset load execution.
    runtime:
      schedule_mode: ci_triggered
      schedule_cron: null
      run_window_start_utc: "00:00"
      run_window_end_utc: "23:59"
      max_active_runs: 1
      dagrun_timeout_minutes: 120
    ingestion:
      execution_mode: dry_run
      command_profile: local
      spark_submit_cmd: python
      strict_mode: true
      max_parallel_datasets: 2
    transformation:
      execution_mode: dbt_build
      dbt_profile: fraudlens_local_spark
      dbt_target: local
      threads: 2
    validation:
      execution_mode: dbt_test
      dbt_profile: fraudlens_local_spark
      dbt_target: local
      strict_mode: true
    observability:
      enabled: true
      emit_metrics: true
      emit_lineage: true
      artifact_backend: mongodb
      mongodb_uri_env: FRAUDLENS_MONGODB_URI
      mongodb_default_uri: ""
      mongodb_database: datalab
      mongodb_collection: orchestration_artifacts
      metrics_namespace: fraudlens.orchestration.ci
      lineage_namespace: fraudlens.orchestration.ci

  snowflake:
    description: Future Snowflake COPY INTO mode (scaffold only).
    runtime:
      schedule_mode: daily
      schedule_cron: "0 2 * * *"
      run_window_start_utc: "01:00"
      run_window_end_utc: "05:00"
      max_active_runs: 1
      dagrun_timeout_minutes: 180
    ingestion:
      execution_mode: dry_run
      command_profile: cloud
      spark_submit_cmd: spark-submit
      strict_mode: true
      max_parallel_datasets: 4
    transformation:
      execution_mode: dbt_build
      dbt_profile: fraudlens_snowflake
      dbt_target: dev
      threads: 4
    validation:
      execution_mode: dbt_test
      dbt_profile: fraudlens_snowflake
      dbt_target: dev
      strict_mode: true
    observability:
      enabled: true
      emit_metrics: true
      emit_lineage: true
      artifact_backend: mongodb
      mongodb_uri_env: FRAUDLENS_MONGODB_URI
      mongodb_default_uri: ""
      mongodb_database: datalab
      mongodb_collection: orchestration_artifacts
      metrics_namespace: fraudlens.orchestration.snowflake
      lineage_namespace: fraudlens.orchestration.snowflake
