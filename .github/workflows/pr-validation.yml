name: PR Validation

on:
  pull_request:
    paths:
      - "dbt/**"
      - ".github/workflows/pr-validation.yml"
  workflow_dispatch:

jobs:
  dbt-structure:
    name: dbt Structure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for Kerberos build
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y krb5-user libkrb5-dev

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          # Profile fraudlens_local_spark uses adapter type: hive
          pip install dbt-core==1.8.7 "dbt-hive>=1.8.0,<1.9.0"
          python -m pip show dbt-core dbt-hive
          python -c "import dbt.adapters.hive; print('hive adapter import ok')"

      - name: Validate dbt structure
        env:
          FRAUDLENS_DBT_PROFILE_NAME: fraudlens_local_spark
          FRAUDLENS_DBT_TARGET_NAME: local
          DBT_SPARK_HOST: localhost
          DBT_SPARK_PORT: "10000"
          DBT_SPARK_USER: ci
          DBT_SPARK_SCHEMA: default
          DBT_SPARK_THREADS: "4"
          DBT_SPARK_AUTH: NOSASL
        run: |
          python -m dbt parse --project-dir dbt --profiles-dir dbt/profiles --profile fraudlens_local_spark --target local
          python -m dbt ls --project-dir dbt --profiles-dir dbt/profiles --profile fraudlens_local_spark --target local

      - name: Validate dbt docs generation
        env:
          FRAUDLENS_DBT_PROFILE_NAME: fraudlens_local_spark
          FRAUDLENS_DBT_TARGET_NAME: local
          DBT_SPARK_HOST: localhost
          DBT_SPARK_PORT: "10000"
          DBT_SPARK_USER: ci
          DBT_SPARK_SCHEMA: default
          DBT_SPARK_THREADS: "4"
          DBT_SPARK_AUTH: NOSASL
        run: |
          python -m dbt docs generate --empty-catalog --project-dir dbt --profiles-dir dbt/profiles --profile fraudlens_local_spark --target local
